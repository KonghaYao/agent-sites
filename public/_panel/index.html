<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AGENT.SITES / CONTROL</title>
<style>
  :root {
    --paper: #f4f1ea;
    --ink: #0a0a0a;
    --accent: #c8102e;
    --muted: #6b6b6b;
    --rule: #0a0a0a;
    --ok: #00661a;
    --warn: #b86c00;
    --err: #c8102e;
    --cell: rgba(10,10,10,0.04);
    --cell-hot: rgba(200,16,46,0.08);
    --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, "Times New Roman", serif;
    --mono: "SF Mono", "JetBrains Mono", "IBM Plex Mono", "Menlo", "Consolas", "DejaVu Sans Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #0b0b0a;
      --ink: #f5f1e6;
      --accent: #ff4d6a;
      --muted: #8a8a82;
      --rule: #f5f1e6;
      --ok: #66d97a;
      --warn: #d9a441;
      --err: #ff4d6a;
      --cell: rgba(245,241,230,0.05);
      --cell-hot: rgba(255,77,106,0.16);
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 0 0 6rem;
  }

  /* Top double-rule banner */
  .banner {
    border-bottom: 3px double var(--rule);
    border-top: 3px double var(--rule);
    padding: 1.2rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 1rem;
  }
  .banner h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 900;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: -0.02em;
    line-height: 1;
    font-style: italic;
  }
  .banner h1 .slash {
    color: var(--accent);
    font-style: normal;
    margin: 0 0.1em;
  }
  .banner h1 .ctl {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.55em;
    font-style: normal;
    letter-spacing: 0.18em;
    display: inline-block;
    transform: translateY(-0.4em);
    color: var(--ink);
  }
  .banner .meta {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .banner .meta strong { color: var(--ink); font-weight: 700; }
  .banner .meta .live {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--ok);
    border-radius: 50%;
    margin-right: 0.4em;
    animation: blink 2s steps(2, start) infinite;
  }
  .banner .meta .live.paused { background: var(--muted); animation: none; }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* Toolbar: refresh + interval */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    background: var(--cell);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .toolbar .left, .toolbar .right { display: flex; gap: 1.2rem; align-items: center; }
  .toolbar button {
    font: inherit;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.35rem 0.9rem;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    cursor: pointer;
    transition: background 0.12s;
  }
  .toolbar button:hover { background: var(--ink); color: var(--paper); }
  .toolbar button.danger:hover { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .toolbar .interval { color: var(--muted); }
  .toolbar .interval b { color: var(--ink); font-weight: 700; }

  /* AUTH bar */
  .auth {
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 0.8rem;
    align-items: center;
  }
  .auth label {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }
  .auth input {
    font-family: var(--mono);
    font-size: 13px;
    padding: 0.45rem 0.6rem;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 0;
    outline: none;
    width: 100%;
  }
  .auth input:focus { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
  .auth button {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0.45rem 1rem;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--rule);
    cursor: pointer;
  }
  .auth button:hover { background: var(--accent); border-color: var(--accent); }
  .badge {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.35rem 0.7rem;
    border: 1px solid var(--rule);
    font-weight: 700;
    white-space: nowrap;
  }
  .badge.set { background: var(--ink); color: var(--paper); }
  .badge.unset { background: var(--accent); color: var(--paper); border-color: var(--accent); }

  /* STATS row */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--rule);
  }
  .stat {
    padding: 1.1rem 1.5rem;
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .stat:last-child { border-right: none; }
  .stat .k {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }
  .stat .v {
    font-family: var(--serif);
    font-size: 2.4rem;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .stat.err .v { color: var(--accent); }
  .stat.ok .v { color: var(--ok); }
  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat { border-bottom: 1px solid var(--rule); }
    .stat:nth-child(2) { border-right: none; }
    .stat:nth-last-child(-n+2) { border-bottom: none; }
  }

  /* TABLE */
  .table-wrap { padding: 0; overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  thead th {
    text-align: left;
    padding: 0.7rem 0.9rem;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    border-bottom: 2px solid var(--rule);
    background: var(--cell);
    white-space: nowrap;
  }
  tbody td {
    padding: 0.65rem 0.9rem;
    border-bottom: 1px solid rgba(10,10,10,0.12);
    vertical-align: middle;
    white-space: nowrap;
  }
  @media (prefers-color-scheme: dark) {
    tbody td { border-bottom-color: rgba(245,241,230,0.12); }
  }
  tbody tr:hover { background: var(--cell); }
  tbody tr.err-row { background: var(--cell-hot); }
  tbody tr.err-row:hover { background: var(--cell-hot); filter: brightness(0.96); }
  tbody tr:last-child td { border-bottom: none; }

  .id-cell {
    font-weight: 700;
    cursor: pointer;
    position: relative;
  }
  .id-cell:hover { color: var(--accent); }
  .id-cell .copied {
    position: absolute;
    left: 0; top: -1.4em;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .id-cell.copied-flash .copied { opacity: 1; }
  .name-cell { color: var(--muted); }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.5em;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex: 0 0 auto;
  }
  .status.running .dot { background: var(--ok); }
  .status.starting .dot { background: var(--warn); animation: blink 1s steps(2, start) infinite; }
  .status.stopped .dot { background: var(--muted); }
  .status.error .dot { background: var(--err); }
  .status.unknown .dot { background: var(--muted); }

  .pb-cell { display: inline-flex; align-items: center; gap: 0.4em; }
  .pb-cell .pb-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }
  .pb-cell.up .pb-dot { background: var(--ok); }
  .pb-cell.down .pb-dot { background: var(--err); }
  .pb-cell.fetching .pb-dot { background: var(--warn); animation: blink 0.8s steps(2, start) infinite; }
  .latency { color: var(--muted); font-size: 11px; }
  .latency.slow { color: var(--warn); }
  .latency.dead { color: var(--err); }

  .age { color: var(--muted); font-size: 11px; }

  a.open {
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11px;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 1px;
  }
  a.open:hover { color: var(--accent); border-color: var(--accent); }

  /* Empty / error states */
  .state-box {
    padding: 3rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  .state-box.serif { font-family: var(--serif); font-size: 1.5rem; font-style: italic; }
  .state-box .small {
    margin-top: 0.6rem;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-style: normal;
  }
  .state-box.err { color: var(--accent); }

  /* Footer colophon */
  .colophon {
    margin-top: 3rem;
    padding: 1.2rem 1.5rem;
    border-top: 3px double var(--rule);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .colophon .right { font-family: var(--serif); font-style: italic; text-transform: none; letter-spacing: 0; font-size: 12px; color: var(--ink); }

  /* small */
  /* ── Detail view ── */
  #detail { display: none; }
  body.detail-open #detail { display: block; }
  body.detail-open .table-wrap,
  body.detail-open .stats,
  body.detail-open .toolbar { display: none; }

  .d-header {
    border-bottom: 3px double var(--rule);
    border-top: 3px double var(--rule);
    padding: 0.9rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .d-header .back {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0.4rem 0.8rem;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--rule);
    cursor: pointer;
    white-space: nowrap;
  }
  .d-header .back:hover { background: var(--accent); border-color: var(--accent); }
  .d-header .info {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
  }
  .d-header .info strong { color: var(--ink); font-weight: 700; }
  .d-header .info .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 0.3em;
  }
  .d-header .info .up .dot { background: var(--ok); }
  .d-header .info .down .dot { background: var(--err); }

  .d-body {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 400px;
  }
  @media (max-width: 720px) {
    .d-body { grid-template-columns: 1fr; }
  }
  .d-sidebar {
    border-right: 1px solid var(--rule);
    padding: 0.6rem 0;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
  }
  @media (max-width: 720px) {
    .d-sidebar { border-right: none; border-bottom: 1px solid var(--rule); max-height: 30vh; }
  }
  .d-sidebar .col-item {
    display: block;
    padding: 0.5rem 1.2rem;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: background 0.1s;
  }
  .d-sidebar .col-item:hover { background: var(--cell); }
  .d-sidebar .col-item.active { background: var(--cell-hot); font-weight: 700; }
  .d-sidebar .col-item .meta {
    display: block;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 0.15em;
  }

  .d-main {
    padding: 1.2rem 1.5rem;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
  }
  .d-main .tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--rule);
    margin-bottom: 1rem;
  }
  .d-main .tabs button {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 0.5rem 1.2rem;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: -2px;
  }
  .d-main .tabs button.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }

  .d-main .schema-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  .d-main .schema-table th {
    text-align: left;
    padding: 0.5rem 0.6rem;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    border-bottom: 2px solid var(--rule);
    background: var(--cell);
  }
  .d-main .schema-table td {
    padding: 0.45rem 0.6rem;
    border-bottom: 1px solid rgba(10,10,10,0.08);
    vertical-align: top;
  }
  @media (prefers-color-scheme: dark) {
    .d-main .schema-table td { border-bottom-color: rgba(245,241,230,0.08); }
  }
  .d-main .rules-block {
    margin-top: 1rem;
    padding: 0.8rem;
    background: var(--cell);
    font-size: 11px;
    line-height: 1.6;
  }
  .d-main .rules-block b {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .d-main .rec-card {
    border: 1px solid var(--rule);
    margin-bottom: 0.8rem;
    padding: 0.8rem 1rem;
    font-size: 12px;
  }
  .d-main .rec-card .rec-meta {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .d-main .rec-field {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 0.4rem;
    padding: 0.25rem 0;
    border-bottom: 1px dotted rgba(10,10,10,0.08);
  }
  @media (prefers-color-scheme: dark) {
    .d-main .rec-field { border-bottom-color: rgba(245,241,230,0.08); }
  }
  .d-main .rec-field:last-child { border-bottom: none; }
  .d-main .rec-field .k {
    font-weight: 700;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .d-main .rec-field .v {
    word-break: break-all;
    white-space: pre-wrap;
    max-height: 4em;
    overflow: hidden;
    font-size: 12px;
  }

  .d-main .pager {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-top: 1rem;
    font-family: var(--mono);
    font-size: 11px;
  }
  .d-main .pager button {
    font: inherit;
    padding: 0.35rem 0.9rem;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--rule);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .d-main .pager button:hover { background: var(--ink); color: var(--paper); }
  .d-main .pager button:disabled { opacity: 0.3; cursor: default; }
  .d-main .pager span { color: var(--muted); }

  ::selection { background: var(--accent); color: var(--paper); }
</style>
</head>
<body>

<header class="banner">
  <h1>
    AGENT<span class="slash">.</span>SITES
    <span class="ctl">/ CONTROL</span>
  </h1>
  <div class="meta">
    <div><span id="live-dot" class="live paused"></span><strong id="live-text">PAUSED</strong></div>
    <div>UPDATED <strong id="updated">—</strong></div>
    <div>BASE <strong id="base-url">—</strong></div>
  </div>
</header>

<div class="toolbar">
  <div class="left">
    <span class="interval">POLL · <b id="interval-label">5s</b></span>
    <button id="btn-poll" type="button">AUTO-REFRESH: ON</button>
  </div>
  <div class="right">
    <button id="btn-refresh" type="button">↻ REFRESH</button>
  </div>
</div>

<section class="auth" aria-label="master key">
  <label for="mk">X-Master-Key</label>
  <input id="mk" type="password" autocomplete="off" spellcheck="false" placeholder="paste platform master key…">
  <button id="btn-mk-save" type="button">SAVE</button>
  <span id="mk-badge" class="badge unset">NOT SET</span>
</section>

<section class="stats" aria-label="aggregate stats">
  <div class="stat"><div class="k">Instances</div><div class="v" id="s-total">—</div></div>
  <div class="stat ok"><div class="k">Alive</div><div class="v" id="s-alive">—</div></div>
  <div class="stat"><div class="k">Dead</div><div class="v" id="s-dead">—</div></div>
  <div class="stat err"><div class="k">Err</div><div class="v" id="s-err">—</div></div>
</section>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:140px">ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Port</th>
        <th>PB Health</th>
        <th>PB Latency</th>
        <th>Created</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="state-box" class="state-box serif" hidden></div>
</div>

<div id="detail">
  <div class="d-header" id="d-header"></div>
  <div class="d-body">
    <nav class="d-sidebar" id="d-sidebar"></nav>
    <div class="d-main" id="d-main"></div>
  </div>
</div>

<footer class="colophon">
  <div>AGENT.SITES · OPS PANEL · v2</div>
  <div class="right">brutalist edition</div>
</footer>

<script>
(() => {
  "use strict";

  const MK_KEY = "agent_sites_master_key";
  const POLL_MS = 5000;

  const $ = (id) => document.getElementById(id);
  const rowsEl = $("rows");
  const stateBox = $("state-box");
  const mkInput = $("mk");
  const mkBadge = $("mk-badge");
  const liveDot = $("live-dot");
  const liveText = $("live-text");
  const updatedEl = $("updated");
  const baseUrlEl = $("base-url");
  const btnPoll = $("btn-poll");
  const btnRefresh = $("btn-refresh");

  // detail view DOM refs
  const detailEl = $("detail");
  const dHeaderEl = $("d-header");
  const dSidebarEl = $("d-sidebar");
  const dMainEl = $("d-main");
  let detailAppId = null;
  let detailApp = null;
  let detailToken = null; // { token, token_id }
  let detailCollections = [];
  let detailActiveCol = null; // 当前选中的 collection id
  let detailActiveTab = "schema"; // "schema" | "records"
  let detailRecordsPage = 1;
  const btnMkSave = $("btn-mk-save");

  let polling = true;
  let pollTimer = null;
  let inflight = false;
  let lastApps = [];

  baseUrlEl.textContent = location.origin;

  // ---------- token lifecycle ----------
  async function acquireToken(appId) {
    const mk = getMK();
    if (!mk) return null;
    try {
      const r = await fetch("/api/tokens", {
        method: "POST",
        headers: { "X-Master-Key": mk, "Content-Type": "application/json" },
        body: JSON.stringify({ app_id: appId }),
      });
      if (!r.ok) return null;
      const j = await r.json();
      return j.data ? { token: j.data.token, token_id: j.data.token_id } : null;
    } catch { return null; }
  }

  async function releaseToken() {
    if (!detailToken) return;
    const mk = getMK();
    if (!mk) return;
    try {
      await fetch(`/api/tokens/${encodeURIComponent(detailToken.token_id)}`, {
        method: "DELETE",
        headers: { "X-Master-Key": mk },
      });
    } catch {}
    detailToken = null;
  }

  // ---------- helpers ----------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
  }

  function getMK() {
    try { return sessionStorage.getItem(MK_KEY) || ""; } catch { return ""; }
  }
  function setMK(v) {
    try { sessionStorage.setItem(MK_KEY, v); } catch {}
  }

  function updateMkBadge() {
    const has = !!getMK();
    mkBadge.textContent = has ? "SET · OK" : "NOT SET";
    mkBadge.classList.toggle("set", has);
    mkBadge.classList.toggle("unset", !has);
  }

  function setStateBox(text, small, isErr) {
    rowsEl.innerHTML = "";
    stateBox.hidden = false;
    stateBox.classList.toggle("err", !!isErr);
    stateBox.innerHTML = escapeHtml(text) +
      (small ? `<div class="small">${escapeHtml(small)}</div>` : "");
  }
  function clearStateBox() {
    stateBox.hidden = true;
    stateBox.innerHTML = "";
  }

  function formatAge(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    const diff = Date.now() - d.getTime();
    if (diff < 0) return "in the future";
    const s = Math.floor(diff / 1000);
    if (s < 60) return s + "s ago";
    const m = Math.floor(s / 60);
    if (m < 60) return m + "m ago";
    const h = Math.floor(m / 60);
    if (h < 24) return h + "h " + (m % 60) + "m ago";
    const dd = Math.floor(h / 24);
    if (dd < 30) return dd + "d " + (h % 24) + "h ago";
    const mo = Math.floor(dd / 30);
    return mo + "mo ago";
  }

  function fmtMs(ms) {
    if (ms == null) return "—";
    if (ms < 1) return "<1ms";
    if (ms < 1000) return Math.round(ms) + "ms";
    return (ms / 1000).toFixed(2) + "s";
  }

  // ---------- render ----------
  function renderRows(apps, healthMap) {
    if (!apps || apps.length === 0) {
      setStateBox("No apps yet.", "create one via POST /api/apps", false);
      return;
    }
    clearStateBox();
    const sorted = [...apps].sort((a, b) =>
      (b.created_at || "").localeCompare(a.created_at || ""));
    rowsEl.innerHTML = sorted.map((a) => {
      const h = healthMap.get(a.id) || { state: "fetching" };
      const isError = a.status === "error";
      return `<tr class="${isError ? "err-row" : ""}">
        <td class="id-cell" data-copy="${escapeHtml(a.id)}">
          <a href="#${escapeHtml(a.id)}" style="color:inherit;text-decoration:none;display:block">${escapeHtml(a.id)}</a>
          <span class="copied">copied</span>
        </td>
        <td class="name-cell">${escapeHtml(a.name || "(unnamed)")}</td>
        <td><span class="status ${escapeHtml(a.status || "unknown")}"><span class="dot"></span>${escapeHtml((a.status || "unknown").toUpperCase())}</span></td>
        <td>${a.port != null ? ":" + escapeHtml(a.port) : "—"}</td>
        <td>${pbHealthCell(h)}</td>
        <td>${pbLatencyCell(h)}</td>
        <td class="age">${escapeHtml(formatAge(a.created_at))}</td>
        <td><a class="open" href="/${encodeURIComponent(a.id)}/" target="_blank" rel="noopener">OPEN ↗</a></td>
      </tr>`;
    }).join("");

    // wire copy handlers
    rowsEl.querySelectorAll(".id-cell").forEach((el) => {
      el.addEventListener("click", async () => {
        const v = el.getAttribute("data-copy") || "";
        try {
          await navigator.clipboard.writeText(v);
          el.classList.add("copied-flash");
          setTimeout(() => el.classList.remove("copied-flash"), 900);
        } catch {}
      });
    });
  }

  function pbHealthCell(h) {
    const cls = "pb-cell " + (h.state || "fetching");
    const label = h.state === "up" ? "HEALTHY"
      : h.state === "down" ? "DOWN"
      : h.state === "fetching" ? "…"
      : "?";
    return `<span class="${cls}"><span class="pb-dot"></span>${label}</span>`;
  }

  function pbLatencyCell(h) {
    if (h.state === "up") {
      const cls = "latency" + (h.ms >= 500 ? " slow" : "");
      return `<span class="${cls}">${fmtMs(h.ms)}</span>`;
    }
    if (h.state === "down") {
      const cls = "latency dead";
      return `<span class="${cls}">${h.code ? "HTTP " + h.code : "NO RESPONSE"}</span>`;
    }
    return `<span class="latency">—</span>`;
  }

  // ---------- detail view rendering ----------
  function renderDetailHeader(app) {
    dHeaderEl.innerHTML = `
      <button class="back" onclick="window.location.hash=''">← BACK</button>
      <div>
        <strong>${escapeHtml(app.name || app.id)}</strong>
        <span style="color:var(--muted);margin-left:0.5em">(${escapeHtml(app.id)})</span>
      </div>
      <div class="info">
        <span>type: <strong>${escapeHtml(app.type || "—")}</strong></span>
        <span>port: <strong>${app.port || "—"}</strong></span>
        <span id="d-pb-state">PB: …</span>
      </div>`;
  }

  function updateDetailPbState(up) {
    const el = document.getElementById("d-pb-state");
    if (!el) return;
    el.innerHTML = up
      ? `<span class="up"><span class="dot"></span>PB: up</span>`
      : `<span class="down"><span class="dot"></span>PB: down</span>`;
  }

  function renderCollectionsSidebar(collections) {
    dSidebarEl.innerHTML = collections.map((c) => {
      const active = detailActiveCol === c.id ? " active" : "";
      const type = c.type || "base";
      const fieldCount = Array.isArray(c.fields) ? c.fields.length : "—";
      return `<button class="col-item${active}" data-col-id="${escapeHtml(c.id)}">
        <span>${escapeHtml(c.name || c.id)}</span>
        <span class="meta">${escapeHtml(type)} · ${fieldCount} fields</span>
      </button>`;
    }).join("");
    if (collections.length === 0) {
      dSidebarEl.innerHTML = `<div style="padding:1rem;color:var(--muted);font-size:11px">No collections</div>`;
    }
    dSidebarEl.querySelectorAll(".col-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        const colId = btn.getAttribute("data-col-id");
        selectCollection(colId);
      });
    });
  }

  function renderDetailTabs() {
    dMainEl.innerHTML = `
      <div class="tabs">
        <button id="tab-schema" class="${detailActiveTab === "schema" ? "active" : ""}" onclick="window._panelSwitchTab('schema')">Schema</button>
        <button id="tab-records" class="${detailActiveTab === "records" ? "active" : ""}" onclick="window._panelSwitchTab('records')">Records</button>
      </div>
      <div id="tab-content">Loading…</div>`;
  }

  function renderSchemaTab(schema) {
    const fields = Array.isArray(schema.fields) ? schema.fields : [];
    const rows = fields.map((f) => {
      const req = f.required ? "✓" : "—";
      const minmax = f.min != null || f.max != null ? `${f.min || 0}/${f.max || "∞"}` : "—";
      return `<tr>
        <td>${escapeHtml(f.name)}</td>
        <td>${escapeHtml(f.type)}</td>
        <td>${req}</td>
        <td>${minmax}</td>
        <td>${escapeHtml(String(f.required ?? "—"))}</td>
      </tr>`;
    }).join("");

    const rules = [
      { k: "listRule", v: schema.listRule },
      { k: "viewRule", v: schema.viewRule },
      { k: "createRule", v: schema.createRule },
      { k: "updateRule", v: schema.updateRule },
      { k: "deleteRule", v: schema.deleteRule },
    ];
    const rulesHtml = rules.map(({ k, v }) =>
      `<div>${escapeHtml(k)}: <code>${v === "" ? "(allow all)" : v === null ? "(deny)" : escapeHtml(String(v))}</code></div>`
    ).join("");

    const tabContent = document.getElementById("tab-content");
    if (!tabContent) return;
    tabContent.innerHTML = `
      <table class="schema-table">
        <thead><tr><th>Name</th><th>Type</th><th>Req</th><th>Min/Max</th><th>Rules</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" style="color:var(--muted)">No fields</td></tr>'}</tbody>
      </table>
      <div class="rules-block">
        <b>Collection Rules</b>
        ${rulesHtml}
      </div>`;
  }

  function renderRecordsTab(result) {
    const items = Array.isArray(result.items) ? result.items : [];
    const page = result.page || 1;
    const totalItems = result.totalItems || 0;
    const totalPages = result.totalPages || 1;
    const perPage = result.perPage || 20;

    if (items.length === 0) {
      const tabContent = document.getElementById("tab-content");
      if (tabContent) tabContent.innerHTML = `<div style="color:var(--muted);padding:2rem;text-align:center">No records</div>`;
      return;
    }

    const cards = items.map((rec) => {
      const metaHtml = rec.created
        ? `<div class="rec-meta">id: ${escapeHtml(rec.id)} · created: ${escapeHtml(rec.created)}${rec.updated ? " · updated: " + escapeHtml(rec.updated) : ""}</div>`
        : "";
      const fields = Object.entries(rec)
        .filter(([k]) => !["id", "collectionId", "collectionName", "created", "updated"].includes(k))
        .map(([k, v]) => {
          let display = v === null ? "—" : typeof v === "object" ? JSON.stringify(v) : String(v);
          if (display.length > 500) display = display.slice(0, 500) + "…";
          return `<div class="rec-field"><span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(display)}</span></div>`;
        }).join("");
      return `<div class="rec-card">${metaHtml}${fields}</div>`;
    }).join("");

    const prevDisabled = page <= 1 ? " disabled" : "";
    const nextDisabled = page >= totalPages ? " disabled" : "";
    const from = (page - 1) * perPage + 1;
    const to = Math.min(page * perPage, totalItems);

    const tabContent = document.getElementById("tab-content");
    if (!tabContent) return;
    tabContent.innerHTML = `
      ${cards}
      <div class="pager">
        <button${prevDisabled} onclick="window._panelPageRecords(${page - 1})">◀ Prev</button>
        <span>${from}–${to} of ${totalItems}</span>
        <button${nextDisabled} onclick="window._panelPageRecords(${page + 1})">Next ▶</button>
      </div>`;
  }

  function renderDetailError(msg) {
    dMainEl.innerHTML = `<div style="padding:2rem;color:var(--err);font-family:var(--mono)">${escapeHtml(msg)}</div>`;
  }

  function renderStats(apps, healthMap) {
    const total = apps.length;
    let alive = 0, err = 0;
    for (const a of apps) {
      if (a.status === "error") err++;
      const h = healthMap.get(a.id);
      if (a.status === "running" && h && h.state === "up") alive++;
    }
    const dead = total - alive;
    $("s-total").textContent = total;
    $("s-alive").textContent = alive;
    $("s-dead").textContent = dead;
    $("s-err").textContent = err;
  }

  // ---------- detail view lifecycle ----------
  async function enterDetail(appId) {
    if (detailAppId === appId && detailToken) return; // already open

    // pause global polling
    stopPolling();
    setLive(false);

    detailAppId = appId;
    detailApp = lastApps.find((a) => a.id === appId) || null;
    detailCollections = [];
    detailActiveCol = null;
    detailActiveTab = "schema";
    detailRecordsPage = 1;

    document.body.classList.add("detail-open");

    if (!detailApp) {
      renderDetailError("App not found in cached list");
      return;
    }
    renderDetailHeader(detailApp);

    // acquire token
    if (!detailToken) {
      detailToken = await acquireToken(appId);
    }
    if (!detailToken) {
      renderDetailError("Failed to acquire platform token — check Master Key");
      return;
    }

    // check PB health
    const h = await fetchPbHealth(detailApp);
    updateDetailPbState(h.state === "up");

    // fetch collections
    const cols = await fetchCollections(appId, detailToken.token);
    if (cols === null) {
      renderDetailError("Failed to load collections — PB may be down");
      return;
    }
    detailCollections = cols;
    renderCollectionsSidebar(cols);
    dMainEl.innerHTML = `<div style="padding:2rem;color:var(--muted)">Select a collection from the sidebar</div>`;
  }

  async function leaveDetail() {
    await releaseToken();
    detailAppId = null;
    detailApp = null;
    detailCollections = [];
    detailActiveCol = null;
    detailToken = null;
    document.body.classList.remove("detail-open");
    // resume polling
    tick();
    if (polling) startPolling();
  }

  async function selectCollection(colId) {
    if (!detailToken || !detailAppId) return;
    detailActiveCol = colId;
    detailActiveTab = "schema";
    detailRecordsPage = 1;
    renderCollectionsSidebar(detailCollections);
    renderDetailTabs();

    // fetch schema
    const schema = await fetchCollectionSchema(detailAppId, detailToken.token, colId);
    if (!schema) {
      renderDetailError("Failed to load collection schema");
      return;
    }
    renderSchemaTab(schema);
  }

  async function switchTab(tab) {
    detailActiveTab = tab;
    const tabSchema = document.getElementById("tab-schema");
    const tabRecords = document.getElementById("tab-records");
    if (tabSchema) tabSchema.classList.toggle("active", tab === "schema");
    if (tabRecords) tabRecords.classList.toggle("active", tab === "records");

    if (!detailToken || !detailAppId || !detailActiveCol) return;
    if (tab === "schema") {
      const schema = await fetchCollectionSchema(detailAppId, detailToken.token, detailActiveCol);
      if (schema) renderSchemaTab(schema);
      else renderDetailError("Failed to load schema");
    } else {
      const result = await fetchCollectionRecords(detailAppId, detailToken.token, detailActiveCol, detailRecordsPage, 20);
      if (result) renderRecordsTab(result);
      else renderDetailError("Failed to load records");
    }
  }

  async function pageRecords(page) {
    detailRecordsPage = page;
    if (!detailToken || !detailAppId || !detailActiveCol) return;
    const result = await fetchCollectionRecords(detailAppId, detailToken.token, detailActiveCol, page, 20);
    if (result) renderRecordsTab(result);
    else renderDetailError("Failed to load records");
  }

  // expose for onclick handlers in HTML fragments
  window._panelSwitchTab = switchTab;
  window._panelPageRecords = pageRecords;

  function setLive(on) {
    liveDot.classList.toggle("paused", !on);
    liveText.textContent = on ? "LIVE" : "PAUSED";
  }

  function setUpdated() {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    updatedEl.textContent = pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
  }

  // ---------- fetch ----------
  async function fetchApps() {
    const mk = getMK();
    if (!mk) {
      setStateBox("X-Master-Key required.", "paste it in the bar above, then SAVE", true);
      lastApps = [];
      renderStats([], new Map());
      return null;
    }
    const r = await fetch("/api/apps", {
      headers: { "X-Master-Key": mk },
      cache: "no-store",
    });
    if (r.status === 401) {
      setStateBox("Bad X-Master-Key.", "rejected by /api/apps — re-paste and SAVE", true);
      return null;
    }
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    return Array.isArray(j.data) ? j.data : [];
  }

  async function fetchCollections(appId, token) {
    try {
      const r = await fetch(
        `/${encodeURIComponent(appId)}/api/collections`,
        { headers: { "Authorization": "Bearer " + token }, cache: "no-store" },
      );
      if (!r.ok) return null;
      const j = await r.json();
      return Array.isArray(j.items) ? j.items : [];
    } catch { return null; }
  }

  async function fetchCollectionSchema(appId, token, colId) {
    try {
      const r = await fetch(
        `/${encodeURIComponent(appId)}/api/collections/${encodeURIComponent(colId)}`,
        { headers: { "Authorization": "Bearer " + token }, cache: "no-store" },
      );
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  }

  async function fetchCollectionRecords(appId, token, colId, page, perPage) {
    try {
      const qs = `?page=${page}&perPage=${perPage}`;
      const r = await fetch(
        `/${encodeURIComponent(appId)}/api/collections/${encodeURIComponent(colId)}/records${qs}`,
        { headers: { "Authorization": "Bearer " + token }, cache: "no-store" },
      );
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  }

  async function fetchPbHealth(app) {
    const t0 = performance.now();
    try {
      const r = await fetch(`/${encodeURIComponent(app.id)}/api/health`, {
        cache: "no-store",
      });
      const ms = performance.now() - t0;
      if (r.ok) return { state: "up", ms };
      return { state: "down", ms, code: r.status };
    } catch (e) {
      const ms = performance.now() - t0;
      return { state: "down", ms, code: 0 };
    }
  }

  async function tick() {
    if (detailAppId) return;
    if (inflight) return;
    inflight = true;
    try {
      const apps = await fetchApps();
      if (apps == null) {
        setLive(false);
        return;
      }
      lastApps = apps;
      if (apps.length === 0) {
        renderRows([], new Map());
        renderStats([], new Map());
        setUpdated();
        setLive(polling);
        return;
      }

      // initial render with fetching state
      const fetching = new Map(apps.map((a) => [a.id, { state: "fetching" }]));
      renderRows(apps, fetching);
      renderStats(apps, fetching);

      // parallel PB health probes
      const entries = await Promise.allSettled(
        apps.map(async (a) => [a.id, await fetchPbHealth(a)])
      );
      const healthMap = new Map();
      for (const e of entries) {
        if (e.status === "fulfilled" && e.value) healthMap.set(e.value[0], e.value[1]);
      }

      renderRows(apps, healthMap);
      renderStats(apps, healthMap);
      setUpdated();
      setLive(polling);
    } catch (e) {
      setStateBox("Fetch failed.", String(e && e.message || e), true);
      setLive(false);
    } finally {
      inflight = false;
    }
  }

  function startPolling() {
    stopPolling();
    if (!polling) return;
    pollTimer = setInterval(() => {
      // skip ticks when master key not set
      if (!getMK()) return;
      tick();
    }, POLL_MS);
  }
  function stopPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = null;
  }

  // ---------- events ----------
  btnMkSave.addEventListener("click", () => {
    setMK(mkInput.value.trim());
    mkInput.value = "";
    updateMkBadge();
    tick();
  });
  mkInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") btnMkSave.click();
  });
  btnRefresh.addEventListener("click", () => tick());
  btnPoll.addEventListener("click", () => {
    polling = !polling;
    btnPoll.textContent = "AUTO-REFRESH: " + (polling ? "ON" : "OFF");
    if (polling) { startPolling(); setLive(!!getMK()); }
    else { stopPolling(); setLive(false); }
  });

  // hash routing for detail view
  function handleHash() {
    const hash = location.hash.replace(/^#/, "");
    if (hash) {
      // entered detail view
      enterDetail(hash);
    } else if (detailAppId) {
      // returned from detail view
      leaveDetail();
    }
  }
  window.addEventListener("hashchange", handleHash);

  // pause polling when tab hidden, resume when visible
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopPolling();
    else if (polling) startPolling();
  });

  // ---------- init ----------
  updateMkBadge();
  setLive(false);
  tick();
  if (polling) startPolling();
})();
</script>
</body>
</html>
